name: transova
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_database: ^12.4.1

  # Location & Maps
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.1

  # Networking
  http: ^1.2.0

  # State Management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.7.2
  pointer_interceptor: ^0.10.1+2
  shared_preferences: ^2.5.5
  flutter_polyline_points: ^3.1.0
  dio: ^5.9.2
  intl: ^0.20.2
  image_picker: ^1.2.2
  firebase_storage: ^13.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - assets/images/